<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fujikura - Maintenance Alerts</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50" r="46" fill="%23DC2626"/%3E%3Ctext x="50" y="64" text-anchor="middle" fill="white" font-size="36" font-family="Arial" font-weight="bold"%3E!%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--red:#DC2626;--red-bg:#FEF2F2;--red-dark:#991B1B;
--yellow:#D97706;--yellow-bg:#FFFBEB;
--green:#16A34A;--green-bg:#F0FDF4;
--navy:#003D7C;--bg:#0F172A;--surface:#1E293B;--surface2:#334155;
--text:#F8FAFC;--text-sec:#94A3B8;--border:#475569;
--radius:12px;
}
html{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-left svg{width:36px;height:36px}
.header-left h1{font-size:1.1rem;font-weight:800}
.header-left small{display:block;font-size:.68rem;color:var(--text-sec);font-weight:400}
.conn-status{display:flex;align-items:center;gap:6px;font-size:.75rem;padding:6px 14px;border-radius:20px;background:var(--surface2)}
.conn-dot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.conn-dot.on{background:var(--green);box-shadow:0 0 8px rgba(22,163,74,.5)}
.conn-dot.off{background:var(--red)}

/* ── ALERT POPUP ── */
.popup-overlay{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.popup-overlay.show{display:flex}
.popup{background:var(--surface);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.5);width:440px;max-width:94vw;overflow:hidden;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
.popup-urgency-bar{height:6px}
.popup-urgency-bar.high{background:var(--red)}
.popup-urgency-bar.medium{background:var(--yellow)}
.popup-urgency-bar.low{background:var(--green)}
.popup-body{padding:28px 24px;text-align:center}
.popup-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.popup-icon.high{background:var(--red-bg);color:var(--red)}
.popup-icon.medium{background:var(--yellow-bg);color:var(--yellow)}
.popup-icon.low{background:var(--green-bg);color:var(--green)}
.popup-icon svg{width:32px;height:32px}
.popup-title{font-size:1.3rem;font-weight:900;margin-bottom:4px}
.popup-subtitle{font-size:.82rem;color:var(--text-sec);margin-bottom:18px}
.popup-detail{background:var(--surface2);border-radius:var(--radius);padding:14px 16px;text-align:left;margin-bottom:18px;font-size:.85rem}
.popup-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.popup-row:last-child{border-bottom:none}
.popup-row .lbl{color:var(--text-sec);font-weight:500}
.popup-row .val{font-weight:700;text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.urg-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.urg-badge.high{background:var(--red);color:#fff}
.urg-badge.medium{background:var(--yellow);color:#fff}
.urg-badge.low{background:var(--green);color:#fff}
.popup-dismiss{width:100%;padding:14px;background:var(--surface2);border:none;color:var(--text);font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.popup-dismiss:hover{background:var(--border)}

@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1.5s ease infinite}

/* ── MAIN ── */
.main{flex:1;padding:24px;max-width:800px;margin:0 auto;width:100%}

/* ── SETTINGS ── */
.settings{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px}
.settings h3{font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.03em}
.settings-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap}
.settings-row label{font-size:.72rem;font-weight:600;color:var(--text-sec);display:block;margin-bottom:3px}
.settings-row input,.settings-row select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem;font-family:inherit;width:180px}
.settings-row input:focus{outline:none;border-color:var(--red)}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-dark)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#15803d}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.sound-toggle{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-sec);cursor:pointer;user-select:none}
.sound-toggle input{accent-color:var(--red);width:16px;height:16px}

/* ── HISTORY ── */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.history-header h2{font-size:.95rem;font-weight:800}
.history-count{font-size:.75rem;color:var(--text-sec);background:var(--surface);padding:4px 12px;border-radius:20px}
.alert-history{display:flex;flex-direction:column;gap:8px}
.alert-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;border-left:4px solid;transition:transform .15s}
.alert-item:hover{transform:translateX(4px)}
.alert-item.high{border-left-color:var(--red)}
.alert-item.medium{border-left-color:var(--yellow)}
.alert-item.low{border-left-color:var(--green)}
.alert-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.alert-item-machine{font-weight:800;font-size:.95rem}
.alert-item-desc{font-size:.82rem;color:var(--text-sec);margin:4px 0}
.alert-item-meta{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--text-sec);flex-wrap:wrap}
.alert-item-meta .sep{color:var(--border)}
.alert-new{animation:flashIn .6s ease}
@keyframes flashIn{0%{background:rgba(220,38,38,.15)}100%{background:var(--surface)}}

.empty{padding:60px 20px;text-align:center;color:var(--text-sec)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:.9rem}

/* ── LIVE INDICATOR ── */
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-right:6px}
.live-dot.pulsing{animation:pulse 1.5s ease infinite}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#DC2626"/><text x="50" y="64" text-anchor="middle" fill="#fff" font-size="40" font-family="Arial" font-weight="bold">!</text></svg>
    <div><h1>Alert Notifications</h1><small>Technician Alert Receiver</small></div>
  </div>
  <div class="conn-status">
    <span class="conn-dot" id="connDot"></span>
    <span id="connLabel">Connecting...</span>
  </div>
</header>

<div class="main">
  <div class="settings">
    <h3>Settings</h3>
    <div class="settings-row">
      <div><label>Your Name</label><input type="text" id="techName" placeholder="e.g. Ahmed" oninput="saveSettings()"></div>
      <div><label>Filter by Machine</label><input type="text" id="filterMachine" placeholder="All machines" oninput="saveSettings()"></div>
      <label class="sound-toggle"><input type="checkbox" id="soundOn" checked onchange="saveSettings()"> Sound Alert</label>
      <button class="btn btn-secondary" onclick="clearHistory()">Clear History</button>
      <button class="btn btn-red" onclick="testNotification()" style="margin-left:auto">Test Alert</button>
    </div>
  </div>

  <div class="history-header">
    <h2><span class="live-dot pulsing"></span> Live Alert Feed</h2>
    <span class="history-count" id="historyCount">0 alerts</span>
  </div>
  <div class="alert-history" id="alertHistory">
    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <p>Waiting for alerts...</p>
      <p style="font-size:.75rem;margin-top:6px;opacity:.5">Alerts submitted from the main app will appear here instantly</p>
    </div>
  </div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <div class="popup-urgency-bar" id="popupBar"></div>
    <div class="popup-body">
      <div class="popup-icon" id="popupIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="popup-title" id="popupTitle">NEW ALERT</div>
      <div class="popup-subtitle" id="popupSubtitle">A new maintenance problem has been reported</div>
      <div class="popup-detail" id="popupDetail"></div>
      <button class="popup-dismiss" onclick="dismissPopup()">DISMISS</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
'use strict';

var SUPABASE_URL='https://tnmiqirhcmrletclftjo.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRubWlxaXJoY21ybGV0Y2xmdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTkyMDIsImV4cCI6MjA5NjQ5NTIwMn0.4yerG6tvGT_8BeoRzCmzeZrae1BlFNpjB6LHpc7gdQA';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

var alertHistory=[];
var knownIds={};
var soundOn=true,filterMach='';
var lastPopupDismiss=0;

// ── Load settings ──
function loadSettings(){
  try{
    var s=JSON.parse(localStorage.getItem('notif_settings')||'{}');
    if(s.name)document.getElementById('techName').value=s.name;
    if(s.filterMachine)document.getElementById('filterMachine').value=s.filterMachine;
    if(s.soundOn!==undefined){soundOn=s.soundOn;document.getElementById('soundOn').checked=s.soundOn}
    filterMach=s.filterMachine||'';
  }catch(e){}
}
function saveSettings(){
  soundOn=document.getElementById('soundOn').checked;
  filterMach=document.getElementById('filterMachine').value.trim().toLowerCase();
  localStorage.setItem('notif_settings',JSON.stringify({
    name:document.getElementById('techName').value,
    filterMachine:document.getElementById('filterMachine').value,
    soundOn:soundOn
  }));
}

// ── Supabase ──
var connected=false;

async function initSupabase(){
  try{
    var r=await sb.from('alerts').select('id').limit(1);
    if(r.error)throw r.error;
    connected=true;
    document.getElementById('connDot').className='conn-dot on';
    document.getElementById('connLabel').textContent='Connected';

    // Load recent alerts
    var hist=await sb.from('alerts').select('*').order('time',{ascending:false}).limit(100);
    if(!hist.error&&hist.data){
      hist.data.forEach(function(a){
        knownIds[a.id]=true;
        alertHistory.push(a);
      });
      renderHistory();
    }

    // Subscribe to new alerts
    sb.channel('alert-notifications')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'alerts'},function(p){
        var alert=p.new;
        if(!alert||!alert.id||knownIds[alert.id])return;
        knownIds[alert.id]=true;
        if(filterMach&&alert.machine&&alert.machine.toLowerCase().indexOf(filterMach)===-1)return;

        alertHistory.unshift(alert);
        renderHistory();

        if((Date.now()-lastPopupDismiss)>3000){
          showPopup(alert);
          if(soundOn)playAlertSound();
          if(Notification&&Notification.permission==='granted'){
            new Notification('MMS Alert - '+alert.machine,{body:alert.desc+'\nUrgency: '+alert.urgency});
          }
        }
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'alerts'},function(p){
        var alert=p.new;
        var idx=alertHistory.findIndex(function(a){return a.id===alert.id});
        if(idx>=0)alertHistory[idx]=alert;
        renderHistory();
      })
      .subscribe();

  }catch(e){
    console.error('Supabase connection failed',e);
    document.getElementById('connLabel').textContent='Connection Failed';
    document.getElementById('connDot').className='conn-dot off';
  }
}

// ── Notification permission ──
if(Notification&&Notification.permission==='default'){Notification.requestPermission()}

// ── Sound ──
function playAlertSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.18,.36].forEach(function(delay){
      var osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=880;osc.type='sine';
      gain.gain.setValueAtTime(.3,ctx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+.12);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+.15);
    });
    setTimeout(function(){
      var osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=1100;osc.type='sine';
      gain.gain.setValueAtTime(.25,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
      osc.start();osc.stop(ctx.currentTime+.2);
    },550);
  }catch(e){}
}

// ── Popup ──
function showPopup(alert){
  var uc=alert.urgency==='High-Urgent'?'high':alert.urgency==='Medium'?'medium':'low';
  document.getElementById('popupBar').className='popup-urgency-bar '+uc;
  document.getElementById('popupIcon').className='popup-icon '+uc;
  document.getElementById('popupTitle').textContent=alert.machine;
  document.getElementById('popupSubtitle').textContent=uc==='high'?'URGENT - Immediate attention required':'New problem reported';
  document.getElementById('popupDetail').innerHTML=
    '<div class="popup-row"><span class="lbl">Machine</span><span class="val">'+esc(alert.machine)+'</span></div>'
    +'<div class="popup-row"><span class="lbl">Zone</span><span class="val">'+esc(alert.zone||'—')+'</span></div>'
    +'<div class="popup-row"><span class="lbl">Problem</span><span class="val">'+esc(alert.desc)+'</span></div>'
    +'<div class="popup-row"><span class="lbl">Urgency</span><span class="val"><span class="urg-badge '+uc+'">'+alert.urgency+'</span></span></div>'
    +'<div class="popup-row"><span class="lbl">Reported by</span><span class="val">'+esc(alert.reporter||'Unknown')+'</span></div>'
    +'<div class="popup-row"><span class="lbl">Time</span><span class="val">'+fmtTime(alert.time)+'</span></div>';
  document.getElementById('popupOverlay').classList.add('show');
  if(uc!=='high')setTimeout(function(){dismissPopup()},8000);
}
window.dismissPopup=function(){document.getElementById('popupOverlay').classList.remove('show');lastPopupDismiss=Date.now()};

// ── Render history ──
function renderHistory(){
  var el=document.getElementById('alertHistory');
  var count=document.getElementById('historyCount');
  var empty=document.getElementById('emptyState');
  if(!alertHistory.length){el.innerHTML='';el.appendChild(empty);empty.style.display='';count.textContent='0 alerts';return}
  empty.style.display='none';
  count.textContent=alertHistory.length+' alert'+(alertHistory.length===1?'':'s');
  el.innerHTML=alertHistory.map(function(a,i){
    var uc=a.urgency==='High-Urgent'?'high':a.urgency==='Medium'?'medium':'low';
    var sl='';
    if(a.status==='in-progress')sl='<span style="color:var(--yellow);font-weight:700">Claimed by '+esc(a.claimed_by)+'</span><span class="sep">&middot;</span>';
    if(a.status==='resolved')sl='<span style="color:var(--green);font-weight:700">Resolved</span><span class="sep">&middot;</span>';
    var isNew=i===0&&(Date.now()-new Date(a.time).getTime())<60000;
    return '<div class="alert-item '+uc+(isNew?' alert-new':'')+'">'
      +'<div class="alert-item-top"><span class="alert-item-machine">'+esc(a.machine)+'</span><span class="urg-badge '+uc+'">'+esc(a.urgency)+'</span></div>'
      +'<div class="alert-item-desc">'+esc(a.desc)+'</div>'
      +'<div class="alert-item-meta">'+sl+esc(a.zone||'')+'<span class="sep">&middot;</span>'+esc(a.reporter||'Unknown')+'<span class="sep">&middot;</span>'+timeAgo(a.time)+'<span class="sep">&middot;</span>'+a.status+'</div>'
      +'</div>';
  }).join('');
}

// ── Test ──
window.testNotification=function(){
  showPopup({id:'test',machine:'TEST MACHINE',zone:'Zone 99',desc:'This is a test alert notification',urgency:'High-Urgent',reporter:'System',time:new Date().toISOString(),status:'open'});
  if(soundOn)playAlertSound();
};
window.clearHistory=function(){if(!confirm('Clear all alert history?'))return;alertHistory=[];knownIds={};renderHistory()};

// ── Helpers ──
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtTime(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function timeAgo(iso){var diff=(Date.now()-new Date(iso).getTime())/1000;if(diff<60)return Math.floor(diff)+'s ago';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';return Math.floor(diff/86400)+'d ago'}

// ── Init ──
loadSettings();renderHistory();initSupabase();

})();
</script>
</body>
</html>
